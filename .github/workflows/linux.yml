
name: Linux, install, launch, test

on:
  workflow_dispatch:

jobs:
  install_launch:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      working-directory: ${{github.workspace}}
      run: |
        sudo apt install python3.12-venv
        python3 -m venv venv
        source venv/bin/activate
        pip install requests
        pip install protobuf
        pip install grpcio
        pip show grpcio
        pip show grpcio-tools
        deactivate

    - name: Run and test
      working-directory: ${{github.workspace}}
      run: |
        source venv/bin/activate
        python3 ex_rates_svc.py > server.log 2>&1 &
        sleep 3
        python3 ex_rates_clnt.py --code USD
        deactivate
