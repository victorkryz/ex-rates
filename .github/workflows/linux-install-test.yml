
name: Linux, install, launch, test

on:
  workflow_dispatch:

jobs:
  install_launch:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      working-directory: ${{github.workspace}}
      run: |
        sudo apt install python3.12-venv
        python3 -m venv venv
        source venv/bin/activate
        pip install requests
        pip install protobuf
        pip install grpcio-tools
        pip install grpcio
        pip show grpcio
        pip show grpcio-tools
        deactivate

    - name: Regenarate gRPC code
      working-directory: ${{github.workspace}}   
      run: |
        source venv/bin/activate
        rm -r gen
        mkdir gen
        python3 -m grpc_tools.protoc -I./protos --python_out=gen --pyi_out=gen --grpc_python_out=gen protos/ex-rates.proto
        ls -l gen
        deactivate


    - name: Run server and client
      working-directory: ${{github.workspace}}
      run: |
        source venv/bin/activate
        python3 ex_rates_svc.py > server.log 2>&1 &
        sleep 3
        python3 ex_rates_clnt.py --code USD
        deactivate

    - name: Test
      working-directory: ${{github.workspace}}
      run: |
        source venv/bin/activate
        python3 ex_rates_svc.py > server.log 2>&1 &
        sleep 3
        export USD_RATE=$(python3 ex_rates_clnt.py --code USD | grep 'USD:' | awk -F ' ' '{print $2}')
        deactivate
        echo $USD_RATE
        if [[ "${USD_RATE}" == "1.0" ]]; then
           exit 0
        else
           exit 1
        fi  

    



